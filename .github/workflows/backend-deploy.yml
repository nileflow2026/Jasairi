name: Backend — Test & Deploy

on:
  push:
    branches: [main]
    paths:
      - "Backend/**"
      - ".github/workflows/backend-deploy.yml"
  pull_request:
    branches: [main]
    paths:
      - "Backend/**"

defaults:
  run:
    working-directory: Backend

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        env:
          NODE_ENV: test
          # Minimal required config for tests — real secrets not needed here
          APPWRITE_ENDPOINT: https://cloud.appwrite.io/v1
          APPWRITE_PROJECT_ID: test-project-id
          APPWRITE_API_KEY: test-api-key-placeholder-32chars-min
          JWT_SECRET: test-jwt-secret-placeholder-that-is-long-enough
          JWT_REFRESH_SECRET: test-jwt-refresh-secret-placeholder-long
          REDIS_URL: redis://localhost:6379
          CORS_ORIGIN: http://localhost:8081
        run: npm test

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: test
    # Only deploy on pushes to main, not on PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service jasiri-backend --detach

      - name: Verify deployment health
        run: |
          echo "Waiting for deployment to stabilise..."
          sleep 30
          response=$(curl --silent --max-time 10 \
            -o /dev/null -w "%{http_code}" \
            ${{ secrets.BACKEND_HEALTH_URL }}/health)
          if [ "$response" != "200" ]; then
            echo "Health check failed with status: $response"
            exit 1
          fi
          echo "Health check passed."
