name: Mobile — EAS Build & Submit

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      profile:
        description: "EAS build profile"
        required: true
        default: "preview"
        type: choice
        options:
          - development
          - preview
          - production
      platform:
        description: "Target platform"
        required: true
        default: "android"
        type: choice
        options:
          - android
          - ios
          - all

defaults:
  run:
    working-directory: Jasiri

jobs:
  build:
    name: EAS Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: Jasiri/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Determine build profile
        id: profile
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "profile=production" >> $GITHUB_OUTPUT
            echo "platform=android" >> $GITHUB_OUTPUT
          else
            echo "profile=${{ github.event.inputs.profile }}" >> $GITHUB_OUTPUT
            echo "platform=${{ github.event.inputs.platform }}" >> $GITHUB_OUTPUT
          fi

      - name: Build with EAS
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
          EXPO_PUBLIC_APPWRITE_PROJECT_ID: ${{ secrets.APPWRITE_PROJECT_ID }}
          EXPO_PUBLIC_APPWRITE_ENDPOINT: https://cloud.appwrite.io/v1
          EAS_PROJECT_ID: ${{ secrets.EAS_PROJECT_ID }}
        run: |
          eas build \
            --profile ${{ steps.profile.outputs.profile }} \
            --platform ${{ steps.profile.outputs.platform }} \
            --non-interactive \
            --no-wait

  submit:
    name: Submit to Store
    runs-on: ubuntu-latest
    needs: build
    # Only auto-submit on production tag pushes
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Submit to Google Play (Internal Track)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        working-directory: Jasiri
        run: |
          eas submit \
            --platform android \
            --profile production \
            --non-interactive \
            --latest
